<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentForge · Outreach Sequence Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     PASTE YOUR ANTHROPIC API KEY ON LINE ~50 BELOW
     Get one free at: https://console.anthropic.com
     ============================================================ */

  :root {
    --bg:        #07080d;
    --surface:   #0e0f17;
    --border:    rgba(255,255,255,0.07);
    --accent:    #c8f560;
    --accent2:   #5c6aff;
    --text:      #d8d8e8;
    --muted:     #555668;
    --muted2:    #363748;
    --score9:    #c8f560;
    --score8:    #f5c842;
    --score7:    #ff9f5a;
    --font-head: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'Instrument Serif', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 10px; }

  /* ---- HEADER ---- */
  header {
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    position: sticky; top: 0;
    background: rgba(7,8,13,0.92);
    backdrop-filter: blur(16px);
    z-index: 100;
  }

  .logo-group { display: flex; align-items: center; gap: 14px; }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 6px var(--accent); }
    50%      { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(200,245,96,0.3); }
  }

  .logo-text { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
  .logo-text span { color: var(--accent); }

  .header-meta { display: flex; gap: 24px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .header-meta b { font-weight: 500; }
  .header-meta .s9 { color: var(--score9); }
  .header-meta .s8 { color: var(--score8); }
  .header-meta .s7 { color: var(--score7); }

  /* ---- API KEY BANNER ---- */
  #api-banner {
    background: linear-gradient(90deg, rgba(92,106,255,0.12), rgba(200,245,96,0.06));
    border-bottom: 1px solid rgba(92,106,255,0.2);
    padding: 12px 40px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  #api-banner label { font-family: var(--font-mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.1em; white-space: nowrap; }
  #api-key-input {
    flex: 1; min-width: 280px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(92,106,255,0.25);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: var(--font-mono); font-size: 12px;
    color: #c8f560; letter-spacing: 0.05em;
  }
  #api-key-input:focus { outline: none; border-color: var(--accent2); }
  #api-key-input::placeholder { color: var(--muted); }
  .save-key-btn {
    background: var(--accent2); color: #fff;
    border: none; border-radius: 6px;
    padding: 8px 18px; font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    cursor: pointer; transition: opacity 0.2s;
  }
  .save-key-btn:hover { opacity: 0.85; }
  #key-status { font-family: var(--font-mono); font-size: 11px; color: var(--score9); display: none; }

  /* ---- MAIN LAYOUT ---- */
  .app-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: calc(100vh - 60px);
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 100%;
    position: sticky; top: 60px;
    overflow: hidden;
  }

  .sidebar-controls {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
  }

  .search-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font-mono); font-size: 12px;
  }
  .search-input:focus { outline: none; border-color: rgba(200,245,96,0.3); }
  .search-input::placeholder { color: var(--muted); }

  .filter-select {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 10px;
    color: var(--muted);
    font-family: var(--font-mono); font-size: 11px;
    cursor: pointer;
  }
  .filter-select:focus { outline: none; }

  .lead-list { overflow-y: auto; flex: 1; }

  .lead-item {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    animation: fadeSlide 0.3s ease forwards;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lead-item:hover { background: rgba(255,255,255,0.025); }
  .lead-item.active {
    background: rgba(200,245,96,0.04);
    border-left-color: var(--accent);
  }

  .lead-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .lead-name { font-family: var(--font-head); font-size: 13.5px; font-weight: 700; color: #ccc; }
  .lead-item.active .lead-name { color: #fff; }
  .score-badge {
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 4px;
    background: rgba(0,0,0,0.4);
  }
  .score-9 { color: var(--score9); border: 1px solid rgba(200,245,96,0.3); }
  .score-8 { color: var(--score8); border: 1px solid rgba(245,200,66,0.3); }
  .score-7 { color: var(--score7); border: 1px solid rgba(255,159,90,0.3); }
  .lead-sector { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  .lead-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted2); }

  /* ---- MAIN PANEL ---- */
  .main-panel { overflow-y: auto; padding: 36px 44px; }

  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; text-align: center; gap: 14px;
  }
  .empty-arrow { font-size: 56px; color: var(--muted2); animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .empty-title { font-family: var(--font-head); font-size: 20px; color: var(--muted); font-weight: 700; }
  .empty-sub { font-size: 14px; color: var(--muted2); }

  /* Lead detail */
  .detail-wrap { max-width: 700px; animation: panelIn 0.35s ease forwards; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-header { margin-bottom: 24px; }
  .detail-title-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .detail-title {
    font-family: var(--font-head); font-size: 26px; font-weight: 800;
    color: #fff; letter-spacing: -0.025em;
  }

  .detail-chips { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .detail-chips span { display: flex; align-items: center; gap: 5px; }

  .angle-box {
    background: rgba(200,245,96,0.035);
    border: 1px solid rgba(200,245,96,0.1);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
  }
  .angle-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--accent);
    letter-spacing: 0.14em; margin-bottom: 8px; text-transform: uppercase;
  }
  .angle-text { font-size: 14px; color: #8a8aa8; line-height: 1.75; font-style: italic; }

  /* Generator box */
  .gen-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 30px;
  }
  .gen-box-label {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .gen-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }

  .input-group { flex: 1; min-width: 200px; }
  .input-group label {
    display: block; font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .text-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-mono); font-size: 12.5px;
  }
  .text-input:focus { outline: none; border-color: rgba(200,245,96,0.35); }
  .text-input::placeholder { color: var(--muted); }

  .gen-btn {
    background: var(--accent);
    color: #07080d;
    border: none; border-radius: 8px;
    padding: 11px 26px;
    font-family: var(--font-head); font-size: 14px; font-weight: 800;
    letter-spacing: 0.01em; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,245,96,0.25); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { background: var(--muted2); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* Spinner */
  .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 50px 0; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(200,245,96,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.12em; }

  /* Error */
  .error-box {
    background: rgba(255,80,80,0.06);
    border: 1px solid rgba(255,80,80,0.18);
    border-radius: 8px; padding: 16px 20px;
    color: #ff8888; font-family: var(--font-mono); font-size: 13px;
    line-height: 1.6;
  }

  /* Sequence output */
  .sequence-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; flex-wrap: wrap; gap: 8px;
  }
  .sequence-title { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: #fff; }
  .sequence-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }

  .touch-card {
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    animation: cardIn 0.4s ease forwards;
    opacity: 0;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .touch-card:nth-child(1) { animation-delay: 0.05s; }
  .touch-card:nth-child(2) { animation-delay: 0.12s; }
  .touch-card:nth-child(3) { animation-delay: 0.19s; }
  .touch-card:nth-child(4) { animation-delay: 0.26s; }
  .touch-card:nth-child(5) { animation-delay: 0.33s; }

  .touch-header {
    padding: 11px 18px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .touch-label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.1em; }
  .touch-icon { font-size: 13px; margin-right: 8px; }

  .copy-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 4px 12px;
    font-family: var(--font-mono); font-size: 10px;
    color: #888; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.08em;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.1); color: #bbb; }
  .copy-btn.copied { color: var(--accent); border-color: rgba(200,245,96,0.3); background: rgba(200,245,96,0.06); }

  .touch-body { padding: 16px 20px; background: rgba(0,0,0,0.25); }
  .touch-subject { margin-bottom: 10px; }
  .touch-subject-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-right: 6px; }
  .touch-subject-text { font-size: 13.5px; color: #aaa; font-style: italic; }
  .touch-message { color: #b8b8cc; font-size: 14px; line-height: 1.85; white-space: pre-wrap; font-family: var(--font-body); }

  /* touch accent colors */
  .t1 { background: rgba(200,245,96,0.06); border: 1px solid rgba(200,245,96,0.12); }
  .t1 .touch-header { border-bottom: 1px solid rgba(200,245,96,0.1); }
  .t1 .touch-label { color: var(--score9); }

  .t2 { background: rgba(92,106,255,0.06); border: 1px solid rgba(92,106,255,0.15); }
  .t2 .touch-header { border-bottom: 1px solid rgba(92,106,255,0.12); }
  .t2 .touch-label { color: #8b94ff; }

  .t3 { background: rgba(0,207,255,0.04); border: 1px solid rgba(0,207,255,0.12); }
  .t3 .touch-header { border-bottom: 1px solid rgba(0,207,255,0.1); }
  .t3 .touch-label { color: #60d4f0; }

  .t4 { background: rgba(245,200,66,0.04); border: 1px solid rgba(245,200,66,0.12); }
  .t4 .touch-header { border-bottom: 1px solid rgba(245,200,66,0.1); }
  .t4 .touch-label { color: var(--score8); }

  .t5 { background: rgba(255,100,100,0.04); border: 1px solid rgba(255,100,100,0.12); }
  .t5 .touch-header { border-bottom: 1px solid rgba(255,100,100,0.1); }
  .t5 .touch-label { color: #ff8888; }

  .pro-tip {
    margin-top: 20px;
    background: rgba(92,106,255,0.05);
    border: 1px solid rgba(92,106,255,0.12);
    border-radius: 8px; padding: 14px 18px;
    font-size: 13px; color: var(--muted); line-height: 1.65;
  }
  .pro-tip strong { color: #8b94ff; }

  /* Responsive */
  @media (max-width: 780px) {
    .app-grid { grid-template-columns: 1fr; height: auto; }
    .sidebar { height: 340px; position: static; }
    .main-panel { padding: 24px 20px; }
    header { padding: 18px 20px; }
    #api-banner { padding: 12px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-dot"></div>
    <div class="logo-text">Talent<span>Forge</span> AI</div>
  </div>
  <div class="header-meta">
    <span><b class="s9">3</b> Priority 9s</span>
    <span><b class="s8">9</b> Strong 8s</span>
    <span><b class="s7">13</b> Good 7s</span>
    <span>25 Total Leads</span>
  </div>
</header>

<!-- API KEY BANNER -->
<div id="api-banner">
  <label for="api-key-input">⚙ ANTHROPIC API KEY</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-…  (get yours free at console.anthropic.com)" autocomplete="off">
  <button class="save-key-btn" onclick="saveKey()">SAVE KEY</button>
  <span id="key-status">✓ Key saved for this session</span>
</div>

<div class="app-grid">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-controls">
      <input class="search-input" type="text" id="search-input" placeholder="Search leads, sectors, locations…" oninput="renderList()">
      <select class="filter-select" id="score-filter" onchange="renderList()">
        <option value="all">All scores</option>
        <option value="9">Score 9</option>
        <option value="8">Score 8</option>
        <option value="7">Score 7</option>
      </select>
    </div>
    <div class="lead-list" id="lead-list"></div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel" id="main-panel">
    <div class="empty-state">
      <div class="empty-arrow">←</div>
      <div class="empty-title">Select a lead to begin</div>
      <div class="empty-sub">25 qualified UK recruitment agencies · AI-personalised 5-touch sequences</div>
    </div>
  </div>

</div>

<script>
// ============================================================
//  CONFIGURATION — PASTE YOUR API KEY HERE (OPTIONAL)
//  You can also enter it in the banner above each session.
// ============================================================
const HARDCODED_API_KEY = ""; // e.g. "sk-ant-api03-xxxx"

// ============================================================
//  LEAD DATA
// ============================================================
const LEADS = [
  { id:1,  name:"Duval Associates",          score:9, location:"Manchester / UK-wide",      size:"~10 consultants",        sector:"Sales, Marketing, Engineering, SaaS, Finance",       website:"duvalassociates.co.uk",           contact:"Managing Director / Owner",          painPoint:"spreading admin thin across multiple disciplines",                                            hook:"pure contingency recruiter placing across 5 disciplines",          angle:"You're placing across 5 disciplines without a big back office. TalentForge can write your JDs, screen CVs, generate outreach and build client pitches in seconds — for £19.95/month." },
  { id:2,  name:"Spotlight Recruitment",     score:9, location:"London (City)",             size:"~5–10 consultants",       sector:"Marketing, Communications, Digital",                 website:"spotlightrecruitment.co.uk",      contact:"Director / Founder",                 painPoint:"generic outreach in a relationship-driven niche",                                             hook:"all ex-marketing professionals running a specialist agency",        angle:"Your team are ex-marketers — you know the difference between generic and genuinely personal. TalentForge writes outreach messages and client pitches that feel bespoke, not templated." },
  { id:3,  name:"Market Recruitment",        score:9, location:"London",                    size:"~5 consultants",          sector:"B2B Marketing, Technology",                          website:"market-recruitment.co.uk",        contact:"Founder / MD",                       painPoint:"time spent on highly bespoke B2B mandate documentation",                                      hook:"niche B2B focus means constant bespoke client pitches and JDs",     angle:"Writing bespoke pitches and JDs for niche B2B mandates takes time you don't have. TalentForge drafts both in seconds. 10 free generations — no card needed." },
  { id:4,  name:"Innova Search",             score:8, location:"Midlands",                  size:"~10–20 consultants",      sector:"Engineering, Manufacturing, Technical",               website:"innovasearch.co.uk",              contact:"Director",                           painPoint:"high CV volume per technical role",                                                           hook:"self-described adopter of cutting-edge technology",                 angle:"Engineering roles get 40+ CVs. TalentForge's batch screener ranks up to 5 at once with fit scores, strengths and a PROGRESS/DECLINE recommendation — so you spend time on calls, not CVs." },
  { id:5,  name:"Impact Creative Recruitment",score:8,location:"London (Shoreditch)",       size:"20 consultants",          sector:"Media, Creative, Tech, Marketing, HR, Finance",       website:"impactcreativerecruitment.co.uk", contact:"MD / Directors",                     painPoint:"inconsistent output quality across a large multi-discipline team",                            hook:"multi-discipline boutique operating since 2001",                    angle:"With 20 consultants across 5 disciplines, keeping JD and outreach quality consistent is a real challenge. TalentForge acts like a shared AI team — everyone gets the same quality output." },
  { id:6,  name:"CLARC Recruitment",         score:8, location:"London",                    size:"~5–15 consultants",       sector:"Legal, Compliance, Financial Services",               website:"clarc.co.uk",                     contact:"Director / Managing Partner",         painPoint:"high client expectations for polished, precise pitches",                                      hook:"specialist compliance recruiter, 30+ years combined experience",    angle:"Your clients are legal and compliance directors — they expect precision. TalentForge's pitch generator reads your prospect's live website and writes a genuinely bespoke pitch, not a mail merge." },
  { id:7,  name:"Dobson Welch",              score:8, location:"UK",                         size:"~5 consultants",          sector:"Multi-sector",                                        website:"dobsonwelch.co.uk",                contact:"Founding Director",                  painPoint:"solo founder wearing every hat",                                                               hook:"self-described honest and transparent independent agency",           angle:"Running a small agency means you're the recruiter, the marketer and the admin team. TalentForge gives you AI tools for JDs, outreach, CV screening and client pitches — built for consultants who do everything themselves." },

// ============================================================
//  STATE
// ============================================================
let apiKey = HARDCODED_API_KEY || localStorage.getItem("tf_api_key") || "";
let selectedLead = null;

// ============================================================
//  INIT
// ============================================================
window.onload = function() {
  if (apiKey) {
    document.getElementById("api-key-input").value = apiKey;
    showKeyStatus();
  }
  renderList();
};

// ============================================================
//  API KEY
// ============================================================
function saveKey() {
  const val = document.getElementById("api-key-input").value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem("tf_api_key", val);
  showKeyStatus();
}

function showKeyStatus() {
  const el = document.getElementById("key-status");
  el.style.display = "inline";
  setTimeout(() => el.style.display = "none", 3000);
}

// ============================================================
//  LEAD LIST
// ============================================================
function renderList() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const scoreF = document.getElementById("score-filter").value;
  const list = document.getElementById("lead-list");

  const filtered = LEADS.filter(l => {
    const matchQ = !q || l.name.toLowerCase().includes(q) || l.sector.toLowerCase().includes(q) || l.location.toLowerCase().includes(q);
    const matchS = scoreF === "all" || String(l.score) === scoreF;
    return matchQ && matchS;
  });

  list.innerHTML = filtered.map(l => `
    <div class="lead-item ${selectedLead?.id === l.id ? 'active' : ''}"
         onclick="selectLead(${l.id})">
      <div class="lead-item-top">
        <span class="lead-name">${l.name}</span>
        <span class="score-badge score-${l.score}">${l.score}/10</span>
      </div>
      <div class="lead-sector">${l.sector.split(",")[0]}</div>
      <div class="lead-meta">${l.location} · ${l.size}</div>
    </div>
  `).join("");
}

// ============================================================
//  SELECT LEAD
// ============================================================
function selectLead(id) {
  selectedLead = LEADS.find(l => l.id === id);
  renderList();
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById("main-panel");
  if (!selectedLead) return;

  panel.innerHTML = `
    <div class="detail-wrap">
      <div class="detail-header">
        <div class="detail-title-row">
          <h2 class="detail-title">${selectedLead.name}</h2>
          <span class="score-badge score-${selectedLead.score}">${selectedLead.score}/10</span>
        </div>
        <div class="detail-chips">
          <span>📍 ${selectedLead.location}</span>
          <span>🏢 ${selectedLead.size}</span>
          <span>🎯 ${selectedLead.sector}</span>
          <span>👤 ${selectedLead.contact}</span>
          <span>🌐 ${selectedLead.website}</span>
        </div>
        <div class="angle-box">
          <div class="angle-label">✦ Outreach Angle</div>
          <div class="angle-text">"${selectedLead.angle}"</div>
        </div>
      </div>

      <div class="gen-box">
        <div class="gen-box-label">Generate 5-Touch Sequence · Email + LinkedIn · 18 Days</div>
        <div class="gen-row">
          <div class="input-group">
            <label for="sender-name">Your Name</label>
            <input class="text-input" id="sender-name" type="text" placeholder="e.g. Alex from TalentForge">
          </div>
          <div class="input-group">
            <label for="sender-role">Your Role (optional)</label>
            <input class="text-input" id="sender-role" type="text" placeholder="e.g. Founder, Sales Lead">
          </div>
          <button class="gen-btn" id="gen-btn" onclick="generateSequence()">⚡ Generate</button>
        </div>
      </div>

      <div id="output-area"></div>
    </div>
  `;
  panel.scrollTop = 0;
}

// ============================================================
//  GENERATE SEQUENCE
// ============================================================
async function generateSequence() {
  if (!apiKey) {
    alert("Please enter your Anthropic API key in the banner at the top.");
    return;
  }

  const senderName = document.getElementById("sender-name")?.value.trim() || "Your name";
  const senderRole = document.getElementById("sender-role")?.value.trim() || "";
  const outputArea = document.getElementById("output-area");
  const btn = document.getElementById("gen-btn");

  btn.disabled = true;
  btn.textContent = "Generating…";
  outputArea.innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-text">CRAFTING YOUR SEQUENCE…</div>
    </div>`;

  const senderLine = senderRole ? `${senderName}, ${senderRole}` : senderName;

  const prompt = `You are an expert B2B sales copywriter. Write a 5-touch cold outreach sequence selling TalentForge AI to a recruitment agency.

PRODUCT: TalentForge AI — £19.95/month SaaS for independent UK recruitment agencies.
Tools included: JD Writer, Batch CV Screener (ranks up to 5 CVs with fit scores + PROGRESS/DECLINE), Candidate Outreach Generator (personalised per LinkedIn/email/WhatsApp), Client Pitch Generator (reads live website URL), Interview Question Bank, SHL-style Psychometric Test Generator.
Free trial: 10 generations, no card needed.

PROSPECT:
Company: ${selectedLead.name}
Size: ${selectedLead.size}
Location: ${selectedLead.location}
Sector: ${selectedLead.sector}
Target contact role: ${selectedLead.contact}
Website: ${selectedLead.website}
Core pain point: ${selectedLead.painPoint}
Key hook: ${selectedLead.hook}
Suggested angle: "${selectedLead.angle}"

SENDER: ${senderLine}

SEQUENCE RULES:
- Touch 1: Cold email. Open with specific observation about their business. Under 100 words. Soft CTA (15-min call or reply).
- Touch 2: LinkedIn connection request. Under 290 characters. Reference the email.
- Touch 3: Follow-up email. DIFFERENT angle — use a mini case study or new pain point. Under 100 words.
- Touch 4: LinkedIn message (after connecting). Short value-add, no hard sell. Under 200 characters.
- Touch 5: Breakup email. Signals final follow-up. Removes pressure. Often gets replies. Under 80 words.

STYLE: Human, specific, never corporate. No "I hope this finds you well". No buzzwords. Each message has ONE job and ONE CTA.

Return ONLY a valid JSON array, no markdown, no backticks, no explanation:
[
  {"touch":1,"channel":"Email","subject":"...","body":"..."},
  {"touch":2,"channel":"LinkedIn","body":"..."},
  {"touch":3,"channel":"Email","subject":"...","body":"..."},
  {"touch":4,"channel":"LinkedIn","body":"..."},
  {"touch":5,"channel":"Email","subject":"Closing the loop","body":"..."}
]`;

  try {
    const res = await fetch("https://lingering-river-47f9.loopstack2.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const raw = (data.content || []).map(c => c.text || "").join("").trim();
    const clean = raw.replace(/```json|```/g, "").trim();
    const sequence = JSON.parse(clean);
    renderSequence(sequence);

  } catch (e) {
    outputArea.innerHTML = `
      <div class="error-box">
        <strong>Error generating sequence.</strong><br><br>
        ${e.message}<br><br>
        Common causes:<br>
        · Invalid or missing API key (check the banner above)<br>
        · API key has no credits (check console.anthropic.com)<br>
        · Network issue — try again in a moment
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "⚡ Generate";
  }
}

// ============================================================
//  RENDER SEQUENCE
// ============================================================
function renderSequence(seq) {
  const outputArea = document.getElementById("output-area");

  const touchMeta = [
    { cls:"t1", icon:"✉", label:"Touch 1 — Cold Email · Day 1" },
    { cls:"t2", icon:"🔗", label:"Touch 2 — LinkedIn Connection · Day 3" },
    { cls:"t3", icon:"✉", label:"Touch 3 — Follow-Up Email · Day 7" },
    { cls:"t4", icon:"🔗", label:"Touch 4 — LinkedIn Value-Add · Day 12" },
    { cls:"t5", icon:"✉", label:"Touch 5 — Breakup Email · Day 18" },
  ];

  const cardsHtml = seq.map((touch, i) => {
    const meta = touchMeta[i] || { cls:"t1", icon:"•", label:`Touch ${i+1}` };
    const subjectHtml = touch.subject
      ? `<div class="touch-subject">
           <span class="touch-subject-label">SUBJECT:</span>
           <span class="touch-subject-text">${escHtml(touch.subject)}</span>
         </div>`
      : "";
    return `
      <div class="touch-card ${meta.cls}">
        <div class="touch-header">
          <span class="touch-label"><span class="touch-icon">${meta.icon}</span>${meta.label}</span>
          <button class="copy-btn" id="copy-${i}" onclick="copyTouch(${i}, this)">COPY</button>
        </div>
        <div class="touch-body">
          ${subjectHtml}
          <div class="touch-message" id="msg-${i}">${escHtml(touch.body || "")}</div>
        </div>
      </div>`;
  }).join("");

  outputArea.innerHTML = `
    <div class="sequence-header">
      <div class="sequence-title">5-Touch Sequence · ${selectedLead.name}</div>
      <div class="sequence-meta">EMAIL + LINKEDIN · 18-DAY CADENCE</div>
    </div>
    ${cardsHtml}
    <div class="pro-tip">
      💡 <strong>Send timing:</strong> Best days for UK recruiters are Tue–Thu.
      Best times: 8–9am or 5:30–6:30pm. Avoid Monday mornings and Friday afternoons.
      LinkedIn messages perform best mid-morning on weekdays.
    </div>`;

  // Store for copy
  window._currentSequence = seq;
  outputArea.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ============================================================
//  COPY
// ============================================================
function copyTouch(idx, btn) {
  const seq = window._currentSequence;
  if (!seq || !seq[idx]) return;
  const touch = seq[idx];
  const text = touch.subject ? `Subject: ${touch.subject}\n\n${touch.body}` : touch.body;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "COPIED ✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "COPY"; btn.classList.remove("copied"); }, 1800);
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
